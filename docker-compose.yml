version: '3.8'
services:
  flowspace:
    build: .
    restart: unless-stopped
    ports:
      - "3070:3070"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3070
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3070/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
